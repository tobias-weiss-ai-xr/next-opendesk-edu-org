services:
  umami:
    image: docker.umami.is/umami-software/umami:postgresql-latest
    container_name: umami
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://umami:umami_secure_password@umami-db:5432/umami
      APP_URL: https://analytics.opendesk-edu.org
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - traefik-web
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-web
      - "traefik.http.routers.umami.rule=Host(\nalytics.opendesk-edu.org\) && !PathPrefix(\/.well-known/acme-challenge/\)"
      - traefik.http.routers.umami.entrypoints=web
      - traefik.http.routers.umami.middlewares=https-redirect@file
      - "traefik.http.routers.umami-secure.rule=Host(\nalytics.opendesk-edu.org\)"
      - traefik.http.routers.umami-secure.entrypoints=websecure
      - traefik.http.routers.umami-secure.tls=true
      - traefik.http.routers.umami-secure.tls.certresolver=mytlschallenge
      - traefik.http.routers.umami-secure.middlewares=security-headers@file
      - traefik.http.services.umami.loadbalancer.server.port=3000

  umami-db:
    image: postgres:16-alpine
    container_name: umami-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami_secure_password
    volumes:
      - umami-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - traefik-web

volumes:
  umami-data:

networks:
  traefik-web:
    external: true
    name: traefik-web
