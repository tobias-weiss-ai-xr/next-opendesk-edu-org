name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []  # run independently of CI — CI validates, deploy ships
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4

      - name: Deploy via SSH
        uses: https://github.com/appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull
            export COMMIT_SHA=$(git rev-parse --short HEAD)
            export IMAGE_TAG="opendesk-edu:${COMMIT_SHA}"
            docker compose build --no-cache
            docker tag opendesk-edu:latest ${IMAGE_TAG} 2>/dev/null || true
            docker compose up -d
            echo "Waiting for app..."
            sleep 10
            if curl -sf --retry 5 --retry-delay 5 http://localhost:3000/en > /dev/null; then
              echo "Smoke test: PASS"
            else
              echo "Smoke test: FAIL"
              curl -sf -X POST "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}" \
                -H "Title: Deploy FAILED - opendesk-edu" \
                -H "Priority: high" \
                -H "Tags: warning" \
                -d "Smoke test failed for commit ${COMMIT_SHA} (${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" 2>/dev/null || true
            fi
            echo "Deploy complete (tag: ${COMMIT_SHA})"
