  <!-- Terminal window mockup -->
  <g transform="translate(80, 80)">
    <!-- Window frame -->
    <rect x="0" y="0" width="500" height="320" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="1.5"/>
    <!-- Title bar -->
