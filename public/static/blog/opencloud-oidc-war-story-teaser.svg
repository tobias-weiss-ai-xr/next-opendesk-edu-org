    <circle cx="34" cy="16" r="5" fill="#f59e0b"/>
    <circle cx="52" cy="16" r="5" fill="#22c55e"/>
    <!-- Terminal title -->
    <text x="250" y="21" text-anchor="middle" fill="#666" font-family="monospace" font-size="11" font-weight="600">opencloud-debug — bash</text>
    <!-- Terminal lines -->
    <text x="16" y="60" fill="#22c55e" font-family="monospace" font-size="13">$</text>
    <text x="30" y="60" fill="#e2e8f0" font-family="monospace" font-size="13">helm test opencloud -n opendesk</text>
    <text x="16" y="80" fill="#ef4444" font-family="monospace" font-size="13">✗ Login test: FAILED (HTTP 403)</text>
    <text x="16" y="100" fill="#e2e8f0" font-family="monospace" font-size="13">  Expected: 302 redirect to login page</text>
    <text x="16" y="120" fill="#e2e8f0" font-family="monospace" font-size="13">  Got: Forbidden — no user auto-provisioned</text>

    <text x="16" y="150" fill="#f59e0b" font-family="monospace" font-size="13">ℹ Checking Keycloak user federation...</text>
    <text x="16" y="170" fill="#e2e8f0" font-family="monospace" font-size="13">  → LDAP search filter: (objectClass=inetOrgPerson)</text>
    <text x="16" y="190" fill="#ef4444" font-family="monospace" font-size="13">  → Missing: equality rule for eduPersonAffiliation</text>
    <text x="16" y="210" fill="#e2e8f0" font-family="monospace" font-size="13">  → Applying attributeTransform... $OCIS_USER_ID</text>
    <text x="16" y="230" fill="#22c55e" font-family="monospace" font-size="13">  ✓ Fixed: schema patched, users synced</text>

    <text x="16" y="258" fill="#22c55e" font-family="monospace" font-size="13">$</text>
    <text x="30" y="258" fill="#e2e8f0" font-family="monospace" font-size="13">curl -s -o /dev/null -w "%{http_code}" https://opencloud.example.cloud</text>
    <text x="16" y="278" fill="#22c55e" font-family="monospace" font-size="13">302 ✓</text>

    <text x="16" y="306" fill="#666" font-family="monospace" font-size="11">3 bugs fixed · 1h 47m of debugging</text>
  </g>

