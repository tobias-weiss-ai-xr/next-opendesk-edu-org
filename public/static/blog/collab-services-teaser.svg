<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="50%" stop-color="#0d0020"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>

    <!-- Purple glow -->
    <filter id="glowWide" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="glowPrimary" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Brand purple gradient -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#571EFA"/>
      <stop offset="100%" stop-color="#927AFA"/>
    </linearGradient>

    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0a30" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#120824" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#571EFA" stroke-width="0.5" opacity="0.06"/>
    </pattern>

    <!-- Dot pattern -->
    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#927AFA" opacity="0.1"/>
    </pattern>

    <!-- Edge accent gradient left -->
    <linearGradient id="edgeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#571EFA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#571EFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="edgeRight" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#927AFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#927AFA" stop-opacity="0"/>
    </linearGradient>

    <!-- Tool card icon gradients -->
    <linearGradient id="jupyterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F37726"/>
      <stop offset="100%" stop-color="#E55B1A"/>
    </linearGradient>
    <linearGradient id="rstudioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#75AADB"/>
      <stop offset="100%" stop-color="#4E8CC3"/>
    </linearGradient>
    <linearGradient id="overleafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#47A138"/>
      <stop offset="100%" stop-color="#358029"/>
    </linearGradient>
    <linearGradient id="vscodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007ACC"/>
      <stop offset="100%" stop-color="#005A9E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- Edge accents -->
  <rect x="0" y="0" width="250" height="630" fill="url(#edgeLeft)"/>
  <rect x="950" y="0" width="250" height="630" fill="url(#edgeRight)"/>
  <rect x="0" y="0" width="1200" height="2" fill="#571EFA" opacity="0.35"/>
  <rect x="0" y="628" width="1200" height="2" fill="#927AFA" opacity="0.2"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="315" rx="250" ry="200" fill="#571EFA" opacity="0.06" filter="url(#glowWide)"/>
  <ellipse cx="1000" cy="315" rx="200" ry="200" fill="#927AFA" opacity="0.04" filter="url(#glowWide)"/>

  <!-- Corner accents -->
  <path d="M 15,15 L 45,15 M 15,15 L 15,45" stroke="#571EFA" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M 1185,15 L 1155,15 M 1185,15 L 1185,45" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>
  <path d="M 15,615 L 45,615 M 15,615 L 15,585" stroke="#571EFA" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M 1185,615 L 1155,615 M 1185,615 L 1185,585" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>

  <!-- ============ TOOL CARDS GRID ============ -->

  <!-- Row 1: JupyterHub, Overleaf, code-server, RStudio, Open WebUI -->
  
  <!-- JupyterHub -->
  <g transform="translate(65, 100)">
    <rect width="130" height="120" rx="14" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="2" y="2" width="126" height="116" rx="12" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- Jupyter icon simplified (flame/flower) -->
    <circle cx="65" cy="50" r="20" fill="url(#jupyterGrad)" opacity="0.85"/>
    <path d="M65 32 L75 50 L65 68 L55 50Z" fill="white" opacity="0.85"/>
    <circle cx="65" cy="50" r="8" fill="#F37726"/>
    <text x="65" y="97" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">JupyterHub</text>
  </g>

  <!-- Overleaf -->
  <g transform="translate(225, 100)">
    <rect width="130" height="120" rx="14" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="2" y="2" width="126" height="116" rx="12" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- Document icon -->
    <rect x="45" y="30" width="40" height="50" rx="4" fill="url(#overleafGrad)" opacity="0.85"/>
    <path d="M45 30 L65 30 L65 55 L45 55Z" fill="white" opacity="0.2"/>
    <line x1="50" y1="65" x2="80" y2="65" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="50" y1="70" x2="75" y2="70" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <text x="65" y="97" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">Overleaf CE</text>
  </g>

  <!-- code-server -->
  <g transform="translate(385, 100)">
    <rect width="130" height="120" rx="14" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="2" y="2" width="126" height="116" rx="12" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- Code brackets icon -->
    <rect x="40" y="32" width="50" height="38" rx="6" fill="url(#vscodeGrad)" opacity="0.85"/>
    <path d="M50 42 L44 51 L50 60" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M80 42 L86 51 L80 60" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M62 40 L68 64" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="65" y="97" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">code-server</text>
  </g>

  <!-- RStudio -->
  <g transform="translate(545, 100)">
    <rect width="130" height="120" rx="14" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="2" y="2" width="126" height="116" rx="12" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- R letter icon -->
    <circle cx="65" cy="50" r="22" fill="url(#rstudioGrad)" opacity="0.85"/>
    <text x="65" y="60" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="bold" fill="white" opacity="0.95">R</text>
    <text x="65" y="97" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">RStudio</text>
  </g>

  <!-- Open WebUI -->
  <g transform="translate(705, 100)">
    <rect width="130" height="120" rx="14" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="2" y="2" width="126" height="116" rx="12" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- Chat/AI bubble icon -->
    <rect x="40" y="32" width="50" height="36" rx="16" fill="url(#iconGrad)" opacity="0.85"/>
    <path d="M40 68 L50 58" stroke="url(#iconGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="55" cy="50" r="3" fill="white" opacity="0.7"/>
    <circle cx="65" cy="50" r="3" fill="white" opacity="0.7"/>
    <circle cx="75" cy="50" r="3" fill="white" opacity="0.7"/>
    <text x="65" y="97" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">Open WebUI</text>
  </g>

  <!-- Row 2: Excalidraw, Slidev, Dask, ttyd, KasmVNC -->
  
  <!-- Excalidraw -->
  <g transform="translate(65, 245)">
    <rect width="130" height="120" rx="14" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="2" y="2" width="126" height="116" rx="12" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- Pencil/drawing icon -->
    <circle cx="65" cy="48" r="20" fill="none" stroke="#927AFA" stroke-width="2" opacity="0.6"/>
    <path d="M48 40 L60 55 L82 40" stroke="#DDD6FE" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M52 52 L52 60" stroke="#927AFA" stroke-width="2" stroke-linecap="round"/>
    <path d="M72 52 L72 60" stroke="#927AFA" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="62" x2="82" y2="62" stroke="#571EFA" stroke-width="1.5" stroke-linecap="round"/>
    <text x="65" y="97" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">Excalidraw</text>
  </g>

  <!-- Slidev -->
  <g transform="translate(225, 245)">
    <rect width="130" height="120" rx="14" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="2" y="2" width="126" height="116" rx="12" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- Slides/presentation icon -->
    <rect x="40" y="32" width="50" height="38" rx="4" fill="url(#iconGrad)" opacity="0.85"/>
    <rect x="45" y="36" width="18" height="14" rx="2" fill="white" opacity="0.85"/>
    <rect x="67" y="36" width="18" height="14" rx="2" fill="white" opacity="0.5"/>
    <rect x="45" y="52" width="18" height="14" rx="2" fill="white" opacity="0.5"/>
    <rect x="67" y="52" width="18" height="14" rx="2" fill="white" opacity="0.3"/>
    <text x="65" y="97" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">Slidev</text>
  </g>

  <!-- Dask Gateway -->
  <g transform="translate(385, 245)">
    <rect width="130" height="120" rx="14" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="2" y="2" width="126" height="116" rx="12" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- Cluster/nodes icon -->
    <circle cx="48" cy="42" r="8" fill="#927AFA" opacity="0.6"/>
    <circle cx="82" cy="42" r="8" fill="#571EFA" opacity="0.6"/>
    <circle cx="65" cy="60" r="8" fill="url(#iconGrad)" opacity="0.85"/>
    <line x1="56" y1="50" x2="60" y2="54" stroke="#927AFA" stroke-width="1.5" opacity="0.5"/>
    <line x1="74" y1="50" x2="70" y2="54" stroke="#571EFA" stroke-width="1.5" opacity="0.5"/>
    <text x="65" y="97" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">Dask Gateway</text>
  </g>

  <!-- ttyd -->
  <g transform="translate(545, 245)">
    <rect width="130" height="120" rx="14" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="2" y="2" width="126" height="116" rx="12" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- Terminal icon -->
    <rect x="38" y="30" width="54" height="42" rx="4" fill="none" stroke="#927AFA" stroke-width="2" opacity="0.7"/>
    <path d="M48 42 L56 50 L48 58" stroke="#DDD6FE" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M60 56 L80 56" stroke="#927AFA" stroke-width="2" stroke-linecap="round"/>
    <text x="65" y="97" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">Web Terminal</text>
  </g>

  <!-- Ollama -->
  <g transform="translate(705, 245)">
    <rect width="130" height="120" rx="14" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="2" y="2" width="126" height="116" rx="12" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- Brain/network icon -->
    <ellipse cx="65" cy="45" rx="16" ry="14" fill="url(#iconGrad)" opacity="0.85"/>
    <path d="M52 50 Q65 65 78 50" fill="none" stroke="#DDD6FE" stroke-width="2" stroke-linecap="round"/>
    <circle cx="55" cy="42" r="2.5" fill="white" opacity="0.6"/>
    <circle cx="65" cy="38" r="2.5" fill="white" opacity="0.8"/>
    <circle cx="75" cy="42" r="2.5" fill="white" opacity="0.6"/>
    <ellipse cx="65" cy="75" rx="10" ry="5" fill="none" stroke="#927AFA" stroke-width="1.5" opacity="0.5"/>
    <path d="M57 78 L65 88 L73 78" fill="none" stroke="#927AFA" stroke-width="1.5" opacity="0.5"/>
    <text x="65" y="97" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">Ollama</text>
  </g>

  <!-- Row 3: KasmVNC + "and more" -->
  
  <g transform="translate(65, 390)">
    <rect width="130" height="120" rx="14" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="2" y="2" width="126" height="116" rx="12" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- Desktop icon -->
    <rect x="38" y="30" width="54" height="38" rx="4" fill="none" stroke="#927AFA" stroke-width="2" opacity="0.7"/>
    <rect x="41" y="34" width="48" height="20" rx="2" fill="url(#iconGrad)" opacity="0.5"/>
    <rect x="52" y="68" width="26" height="6" rx="1" fill="#927AFA" opacity="0.4"/>
    <rect x="58" y="74" width="14" height="14" rx="2" fill="none" stroke="#571EFA" stroke-width="1.5" opacity="0.5"/>
    <text x="65" y="97" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">KasmVNC</text>
  </g>

  <g transform="translate(225, 390)">
    <rect width="130" height="120" rx="14" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="2" y="2" width="126" height="116" rx="12" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- Dask icon (distributed compute) -->
    <circle cx="48" cy="50" r="12" fill="none" stroke="#571EFA" stroke-width="1.5" opacity="0.5"/>
    <circle cx="82" cy="50" r="12" fill="none" stroke="#927AFA" stroke-width="1.5" opacity="0.5"/>
    <circle cx="65" cy="50" r="8" fill="url(#iconGrad)" opacity="0.6"/>
    <circle cx="48" cy="50" r="3" fill="#571EFA" opacity="0.4"/>
    <circle cx="82" cy="50" r="3" fill="#927AFA" opacity="0.4"/>
    <text x="65" y="97" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">+3 more tools</text>
  </g>

  <!-- ============ HEADLINE & BRANDING ============ -->

  <!-- "Collab Services" headline on the right area -->
  <g transform="translate(450, 395)">
    <rect x="0" y="20" width="690" height="195" rx="20" fill="none"/>
    
    <!-- openDesk Edu brand mark (small D icon top left of headline area) -->
    <g transform="translate(0, 0)" filter="url(#glowSoft)">
      <rect x="0" y="0" width="52" height="52" rx="12" fill="url(#iconGrad)"/>
      <text x="26" y="37" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="bold" fill="white">D</text>
    </g>

    <!-- Headline -->
    <text x="70" y="40" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="white" letter-spacing="1" filter="url(#glowSoft)">Collab Services</text>
    
    <!-- Subtitle -->
    <text x="70" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="400" fill="#927AFA" letter-spacing="1" opacity="0.85">11 Scientific Computing Tools for Research</text>

    <!-- Thin separator -->
    <line x1="70" y1="90" x2="450" y2="90" stroke="#571EFA" stroke-width="1" opacity="0.4"/>

    <!-- Tagline -->
    <text x="70" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="400" fill="#DDD6FE" letter-spacing="0.5" opacity="0.7">JupyterHub · Overleaf · code-server · RStudio · Open WebUI</text>
    <text x="70" y="138" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="400" fill="#DDD6FE" letter-spacing="0.5" opacity="0.7">Excalidraw · Slidev · Dask Gateway · Ollama · ttyd · KasmVNC</text>

    <!-- Status badges -->
    <rect x="70" y="155" width="58" height="22" rx="11" fill="none" stroke="#47A138" stroke-width="1.5" opacity="0.4"/>
    <text x="99" y="170" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#47A138" font-weight="600" opacity="0.7">7 STABLE</text>
    
    <rect x="138" y="155" width="52" height="22" rx="11" fill="none" stroke="#EAB308" stroke-width="1.5" opacity="0.4"/>
    <text x="164" y="170" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#EAB308" font-weight="600" opacity="0.7">4 BETA</text>

    <rect x="200" y="155" width="66" height="22" rx="11" fill="none" stroke="#927AFA" stroke-width="1.5" opacity="0.4"/>
    <text x="233" y="170" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA" font-weight="600" opacity="0.7">1 PLANNED</text>
  </g>

  <!-- openDesk wordmark bottom-right -->
  <g transform="translate(890, 570)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="white" letter-spacing="2" opacity="0.5">openDesk</text>
    <text x="107" y="0" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="20" font-weight="300" fill="#927AFA" letter-spacing="5" opacity="0.5">EDU</text>
  </g>
</svg>
